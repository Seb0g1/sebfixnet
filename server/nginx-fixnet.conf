# Nginx config for fixnet.sebog1.ru
# Place in /etc/nginx/sites-available/fixnet.sebog1.ru

server {
    listen 80;
    server_name fixnet.sebog1.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name fixnet.sebog1.ru;

    ssl_certificate /etc/letsencrypt/live/fixnet.sebog1.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fixnet.sebog1.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
