services:
  xray:
    image: teddysun/xray:latest
    container_name: inetfix-xray
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
    cap_add:
      - NET_BIND_SERVICE

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: inetfix-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    volumes:
      - backend-data:/app/data
      - ../shared:/app/shared:ro
      - ./releases:/app/releases:ro
    depends_on:
      - xray

  bot:
    build:
      context: ../bot
      dockerfile: Dockerfile
    container_name: inetfix-bot
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      - backend

volumes:
  backend-data:
