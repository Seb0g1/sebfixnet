name: Build FixInet.ez Native App

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/build-fixinet.yml"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare logo PNG
        shell: pwsh
        run: |
          pip install pillow --quiet
          python -c "from PIL import Image; from pathlib import Path; p=Path('public/logo.png'); img=Image.open(p); img.convert('RGBA').save(p) if img.format != 'PNG' else None"

      - name: Generate Tauri icons
        run: npx @tauri-apps/cli icon public/logo.png -o src-tauri/icons

      - name: Download sing-box
        shell: pwsh
        run: ./scripts/download-singbox.ps1

      - name: Build Tauri NSIS installer
        run: npm run tauri:build
        env:
          CI: true

      - name: Copy installer to releases
        shell: pwsh
        run: |
          $releases = Join-Path $PWD "..\server\releases"
          New-Item -ItemType Directory -Force -Path $releases | Out-Null
          $built = Get-ChildItem -Path "src-tauri\target\release\bundle\nsis\*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $built) { throw "NSIS installer not found" }
          Copy-Item $built.FullName (Join-Path $releases "FixInet.ez-Setup-1.0.0.exe") -Force
          Write-Host "Installer: $(Join-Path $releases 'FixInet.ez-Setup-1.0.0.exe')"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FixInet.ez-Setup-1.0.0
          path: server/releases/FixInet.ez-Setup-1.0.0.exe
          if-no-files-found: error
